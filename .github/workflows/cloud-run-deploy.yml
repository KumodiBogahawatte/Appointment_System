name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REPOSITORY: appointmentsystem
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: user-service
            build_path: user-service
          - service: doctor-service
            build_path: doctor-service
          - service: appointment-service
            build_path: appointment-service
          - service: feedback-service
            build_path: feedback-service
          - service: api-gateway
            build_path: api-gateway
          - service: admin-frontend
            build_path: admin
          - service: user-frontend
            build_path: userFrontend/appointment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP
      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🐳 Configure Docker for Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      # 🏗 Build Image
      - name: Build Docker Image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}
          BUILD_ARGS=""
          
          # Add build args for frontend services
          if [ "${{ matrix.service }}" == "admin-frontend" ]; then
            BUILD_ARGS="--build-arg VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }} \
                        --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
                        --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
                        --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
                        --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
                        --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
                        --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}"
          elif [ "${{ matrix.service }}" == "user-frontend" ]; then
            BUILD_ARGS="--build-arg VITE_API_URL=${{ secrets.VITE_API_URL }}"
          fi
          
          docker build -t $IMAGE:latest $BUILD_ARGS ./${{ matrix.build_path }}

      # 📦 Push Image
      - name: Push Docker Image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}
          docker push $IMAGE:latest

      # 🚀 Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}

          if [ "${{ matrix.service }}" == "user-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_USER_SERVICE }},JWT_SECRET=${{ secrets.JWT_SECRET }}"

          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_DOCTOR_SERVICE }}"

          elif [ "${{ matrix.service }}" == "appointment-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_APPOINTMENT_SYSTEM }},API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }}"

          elif [ "${{ matrix.service }}" == "feedback-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_FEEDBACK_SERVICE }}"

          elif [ "${{ matrix.service }}" == "api-gateway" ]; then
            # Use service URL secrets if available, otherwise use localhost (for local testing)
            USER_SERVICE_URL="${{ secrets.USER_SERVICE_URL }}"
            DOCTOR_SERVICE_URL="${{ secrets.DOCTOR_SERVICE_URL }}"
            APPOINTMENT_SERVICE_URL="${{ secrets.APPOINTMENT_SERVICE_URL }}"
            FEEDBACK_SERVICE_URL="${{ secrets.FEEDBACK_SERVICE_URL }}"
            
            # Build ENV_VARS with available URLs
            ENV_VARS="USER_SERVICE_URL=${USER_SERVICE_URL:-http://user-service:3001}"
            ENV_VARS="$ENV_VARS,DOCTOR_SERVICE_URL=${DOCTOR_SERVICE_URL:-http://doctor-service:3002}"
            ENV_VARS="$ENV_VARS,APPOINTMENT_SERVICE_URL=${APPOINTMENT_SERVICE_URL:-http://appointment-service:3003}"
            ENV_VARS="$ENV_VARS,FEEDBACK_SERVICE_URL=${FEEDBACK_SERVICE_URL:-http://feedback-service:3004}"
          
          elif [ "${{ matrix.service }}" == "admin-frontend" ]; then
            ENV_VARS="VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }}"
          
          elif [ "${{ matrix.service }}" == "user-frontend" ]; then
            ENV_VARS="VITE_API_URL=${{ secrets.VITE_API_URL }}"
          fi

          gcloud run deploy ${{ matrix.service }} \
            --image $IMAGE:latest \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars $ENV_VARS \
            --timeout 600 \
            --quiet 2>&1 || { echo "Deployment failed"; exit 1; }
