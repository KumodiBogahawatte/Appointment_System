name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REPOSITORY: appointmentsystem
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - doctor-service
          - appointment-service
          - feedback-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP
      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🐳 Configure Docker for Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      # 🏗 Build Image
      - name: Build Docker Image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}
          docker build -t $IMAGE:latest ./${{ matrix.service }}

      # 📦 Push Image
      - name: Push Docker Image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}
          docker push $IMAGE:latest

      # 🚀 Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}

          if [ "${{ matrix.service }}" == "user-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_USER_SERVICE }},JWT_SECRET=${{ secrets.JWT_SECRET }}"
            PORT=3001

          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_DOCTOR_SERVICE }}"
            PORT=3002

          elif [ "${{ matrix.service }}" == "appointment-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_APPOINTMENT_SYSTEM }}"
            PORT=3003

          elif [ "${{ matrix.service }}" == "feedback-service" ]; then
            ENV_VARS="MONGO_URI=${{ secrets.MONGO_URI_FEEDBACK_SERVICE }}"
            PORT=3004

          elif [ "${{ matrix.service }}" == "api-gateway" ]; then
            ENV_VARS="USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }},DOCTOR_SERVICE_URL=${{ secrets.DOCTOR_SERVICE_URL }},APPOINTMENT_SERVICE_URL=${{ secrets.APPOINTMENT_SERVICE_URL }},FEEDBACK_SERVICE_URL=${{ secrets.FEEDBACK_SERVICE_URL }}"
            PORT=3000
          fi

          gcloud run deploy ${{ matrix.service }} \
            --image $IMAGE:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars $ENV_VARS,PORT=$PORT