name: Build & Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY_HOSTNAME: gcr.io

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service-name: user-service
            service-path: user-service
          - service-name: doctor-service
            service-path: doctor-service
          - service-name: appointment-service
            service-path: appointment-service
          - service-name: feedback-service
            service-path: feedback-service
          - service-name: api-gateway
            service-path: api-gateway
          - service-name: admin-frontend
            service-path: admin
          - service-name: user-frontend
            service-path: userFrontend/appointment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build Docker Image
        run: |
          # Prepare build arguments based on service type
          BUILD_ARGS=""
          
          if [ "${{ matrix.service-name }}" == "admin-frontend" ]; then
            BUILD_ARGS="--build-arg VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }} \
                        --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
                        --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
                        --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
                        --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
                        --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
                        --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}"
          elif [ "${{ matrix.service-name }}" == "user-frontend" ]; then
            BUILD_ARGS="--build-arg VITE_API_URL=${{ secrets.VITE_API_URL }}"
          fi
          
          docker build \
            -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ matrix.service-name }}:${{ github.sha }}" \
            -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ matrix.service-name }}:latest" \
            $BUILD_ARGS \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            ./${{ matrix.service-path }}

      - name: Push to Google Container Registry
        run: |
          docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ matrix.service-name }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ matrix.service-name }}:latest"

      - name: Deploy to Cloud Run
        run: |
          # Set environment variables based on service
          if [ "${{ matrix.service-name }}" == "user-service" ]; then
            ENVIRONMENT_VARS="PORT=3001,\
            MONGO_URI=${{ secrets.MONGO_URI_USER_SERVICE }},\
            JWT_SECRET=${{ secrets.JWT_SECRET }},\
            API_GATEWAY_URL=http://api-gateway:3000"
            MEMORY=512Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "doctor-service" ]; then
            ENVIRONMENT_VARS="PORT=3002,\
            MONGO_URI=${{ secrets.MONGO_URI_DOCTOR_SERVICE }},\
            API_GATEWAY_URL=http://api-gateway:3000"
            MEMORY=512Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "appointment-service" ]; then
            ENVIRONMENT_VARS="PORT=3003,\
            MONGO_URI=${{ secrets.MONGO_URI_APPOINTMENT_SYSTEM }},\
            API_GATEWAY_URL=http://api-gateway:3000"
            MEMORY=512Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "feedback-service" ]; then
            ENVIRONMENT_VARS="PORT=3004,\
            MONGO_URI=${{ secrets.MONGO_URI_FEEDBACK_SERVICE }},\
            API_GATEWAY_URL=http://api-gateway:3000"
            MEMORY=512Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "api-gateway" ]; then
            ENVIRONMENT_VARS="PORT=3000,\
            USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }},\
            DOCTOR_SERVICE_URL=${{ secrets.DOCTOR_SERVICE_URL }},\
            APPOINTMENT_SERVICE_URL=${{ secrets.APPOINTMENT_SERVICE_URL }},\
            FEEDBACK_SERVICE_URL=${{ secrets.FEEDBACK_SERVICE_URL }}"
            MEMORY=512Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "admin-frontend" ]; then
            ENVIRONMENT_VARS="VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }},\
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }},\
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }},\
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }},\
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }},\
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }},\
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}"
            MEMORY=256Mi
            CPU=1
          elif [ "${{ matrix.service-name }}" == "user-frontend" ]; then
            ENVIRONMENT_VARS="VITE_API_URL=${{ secrets.VITE_API_URL }}"
            MEMORY=256Mi
            CPU=1
          fi

          gcloud run deploy ${{ matrix.service-name }} \
            --image "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ matrix.service-name }}:${{ github.sha }}" \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --memory $MEMORY \
            --cpu $CPU \
            --set-env-vars "$ENVIRONMENT_VARS" \
            --allow-unauthenticated \
            --project ${{ env.PROJECT_ID }}
