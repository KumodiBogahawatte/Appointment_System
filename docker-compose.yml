version: "3.8"

services:

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=mysecret
      # Replace this with your actual MongoDB Cloud URI (e.g., mongodb+srv://username:password@cluster.../users)
      - MONGO_URI=${MONGO_URI_USER:-mongodb+srv://userservice:q47XEBZix4CLoIak@cluster0.oeykwim.mongodb.net/userservice_db?retryWrites=true&w=majority&appName=Cluster0}
