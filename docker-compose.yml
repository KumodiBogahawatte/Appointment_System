  doctor-service:
    build: ./doctor-service
    container_name: doctor-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      # Replace this with your actual MongoDB Cloud URI
      - MONGO_URI=${MONGO_URI_DOCTOR:-mongodb+srv://marasinghasasun01_db_user:3396@cluster0.qv3vjfb.mongodb.net/?appName=Cluster0}
